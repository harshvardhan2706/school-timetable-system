spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Teacher Service Route
        - id: teacher-service
          uri: lb://teacher-service
          predicates:
            - Path=/api/teachers/**
          filters:
            - StripPrefix=2
        
        # Auth Service Route
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=2
        
        # Class Service Route
        - id: class-service
          uri: lb://class-service
          predicates:
            - Path=/api/classes/**
          filters:
            - StripPrefix=2
      
      # Enable discovery locator for automatic route generation
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      # CORS Configuration
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    register-with-eureka: true
    fetch-registry: true

# Logging Configuration
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
